<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案A - 精简侧边栏</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#0f172a; color:#e2e8f0; display:flex; height:100vh; overflow:hidden; }
nav { width:72px; background:rgba(30,41,59,0.9); backdrop-filter:blur(20px); display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:4px; border-right:1px solid rgba(148,163,184,0.08); transition:width .2s; }
nav:hover { width:200px; }
nav .logo { width:40px; height:40px; background:linear-gradient(135deg,#3b82f6,#8b5cf6); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; margin-bottom:24px; flex-shrink:0; }
nav a { width:100%; height:48px; display:flex; align-items:center; padding:0 20px; color:#94a3b8; text-decoration:none; font-size:14px; gap:16px; border-radius:0; transition:.15s; white-space:nowrap; overflow:hidden; }
nav a:hover, nav a.active { color:#e2e8f0; background:rgba(59,130,246,0.12); }
nav a .icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
nav a .label { opacity:0; transition:opacity .15s; }
nav:hover a .label { opacity:1; }
main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
header { height:56px; background:rgba(30,41,59,0.6); backdrop-filter:blur(12px); display:flex; align-items:center; padding:0 28px; font-size:15px; font-weight:500; border-bottom:1px solid rgba(148,163,184,0.08); flex-shrink:0; gap:16px; }
header .badge { font-size:12px; color:#3b82f6; background:rgba(59,130,246,0.15); padding:2px 10px; border-radius:20px; }
.content { flex:1; padding:24px; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:20px; align-content:start; }
.card { background:rgba(30,41,59,0.5); backdrop-filter:blur(10px); border:1px solid rgba(148,163,184,0.06); border-radius:16px; padding:24px; transition:.2s; }
.card:hover { border-color:rgba(59,130,246,0.3); transform:translateY(-2px); }
.card h3 { font-size:15px; margin-bottom:8px; }
.card p { font-size:13px; color:#94a3b8; line-height:1.6; }
.card .tag { display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; margin-right:6px; }
.tag-blue { background:rgba(59,130,246,0.15); color:#60a5fa; }
.tag-green { background:rgba(16,185,129,0.15); color:#34d399; }
.tag-purple { background:rgba(139,92,246,0.15); color:#a78bfa; }
.stats { display:flex; gap:20px; margin-bottom:24px; }
.stat { flex:1; background:rgba(30,41,59,0.5); backdrop-filter:blur(10px); border:1px solid rgba(148,163,184,0.06); border-radius:14px; padding:20px; }
.stat .num { font-size:32px; font-weight:700; }
.stat .label { font-size:12px; color:#94a3b8; margin-top:4px; }
</style>
</head>
<body>
<nav>
  <div class="logo">创</div>
  <a href="#" class="active"><span class="icon">◈</span><span class="label">工作台</span></a>
  <a href="#"><span class="icon">🔥</span><span class="label">爆款选题</span></a>
  <a href="#"><span class="icon">✎</span><span class="label">内容改写</span></a>
  <a href="#"><span class="icon">♪</span><span class="label">语音系统</span></a>
  <a href="#"><span class="icon">▶</span><span class="label">视频生成</span></a>
  <a href="#"><span class="icon">📁</span><span class="label">素材库</span></a>
  <a href="#"><span class="icon">♥</span><span class="label">成品视频</span></a>
</nav>
<main>
  <header>工作台<span class="badge">深色专业风</span></header>
  <div class="content">
    <div class="stats" style="grid-column:1/-1;">
      <div class="stat"><div class="num" style="color:#3b82f6">12</div><div class="label">视频项目</div></div>
      <div class="stat"><div class="num" style="color:#10b981">5</div><div class="label">已完成</div></div>
      <div class="stat"><div class="num" style="color:#f59e0b">3</div><div class="label">处理中</div></div>
      <div class="stat"><div class="num">34</div><div class="label">素材文件</div></div>
    </div>
    <div class="card"><h3>秦始皇陵地宫揭秘</h3><p>历史考古类口播视频</p><span class="tag tag-green">已完成</span><span class="tag tag-blue">9:16竖屏</span></div>
    <div class="card"><h3>赤壁之战地理考</h3><p>三国历史深度解说</p><span class="tag tag-green">已完成</span><span class="tag tag-blue">9:16竖屏</span></div>
    <div class="card"><h3>唐朝长安城百万人口</h3><p>唐代历史科普</p><span class="tag tag-purple">处理中</span><span class="tag tag-blue">16:9横屏</span></div>
    <div class="card"><h3>全屋定制报价揭秘</h3><p>家居装修防坑指南</p><span class="tag tag-green">已完成</span></div>
    <div class="card"><h3>微波炉谣言真相</h3><p>生活科普类口播</p><span class="tag tag-purple">草稿</span></div>
    <div class="card"><h3>RX7900XTX评测</h3><p>数码科技类视频</p><span class="tag tag-purple">草稿</span></div>
  </div>
</main>
</body>
</html>
