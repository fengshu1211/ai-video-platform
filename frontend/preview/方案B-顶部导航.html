<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案B - 顶部导航</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background:#0f172a; color:#e2e8f0; height:100vh; display:flex; flex-direction:column; }
header { height:60px; background:rgba(30,41,59,0.85); backdrop-filter:blur(20px); display:flex; align-items:center; padding:0 28px; border-bottom:1px solid rgba(148,163,184,0.08); gap:32px; flex-shrink:0; }
header .logo { font-size:18px; font-weight:700; letter-spacing:1px; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }
header nav { display:flex; gap:4px; flex:1; }
header nav a { padding:8px 18px; border-radius:8px; color:#94a3b8; text-decoration:none; font-size:14px; font-weight:500; transition:.15s; white-space:nowrap; }
header nav a:hover, header nav a.active { color:#e2e8f0; background:rgba(59,130,246,0.12); }
header .right { display:flex; align-items:center; gap:12px; }
header .right .btn { padding:6px 16px; background:#3b82f6; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; }
main { flex:1; display:flex; overflow:hidden; }
.content { flex:1; padding:28px; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; align-content:start; }
.card { background:rgba(30,41,59,0.5); backdrop-filter:blur(10px); border:1px solid rgba(148,163,184,0.06); border-radius:16px; overflow:hidden; transition:.2s; }
.card:hover { border-color:rgba(59,130,246,0.3); transform:translateY(-2px); }
.card .thumb { height:160px; background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(139,92,246,0.2)); display:flex; align-items:center; justify-content:center; font-size:48px; }
.card .body { padding:20px; }
.card .body h3 { font-size:15px; margin-bottom:6px; }
.card .body p { font-size:13px; color:#94a3b8; margin-bottom:12px; }
.card .body .meta { display:flex; justify-content:space-between; align-items:center; }
.card .body .tag { font-size:11px; padding:3px 10px; border-radius:12px; }
.tag-green { background:rgba(16,185,129,0.15); color:#34d399; }
.tag-blue { background:rgba(59,130,246,0.15); color:#60a5fa; }
.tag-yellow { background:rgba(245,158,11,0.15); color:#fbbf24; }
.stats-bar { display:flex; gap:20px; margin-bottom:24px; grid-column:1/-1; }
.stat { flex:1; background:rgba(30,41,59,0.5); backdrop-filter:blur(10px); border:1px solid rgba(148,163,184,0.06); border-radius:14px; padding:18px 24px; display:flex; align-items:center; gap:16px; }
.stat .icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; }
.stat .info .num { font-size:26px; font-weight:700; }
.stat .info .label { font-size:12px; color:#94a3b8; }
</style>
</head>
<body>
<header>
  <div class="logo">自媒体创作平台</div>
  <nav>
    <a href="#" class="active">工作台</a>
    <a href="#">爆款选题</a>
    <a href="#">内容改写</a>
    <a href="#">语音系统</a>
    <a href="#">视频生成</a>
    <a href="#">素材库</a>
    <a href="#">成品视频</a>
  </nav>
  <div class="right"><button class="btn">+ 新建项目</button></div>
</header>
<main>
  <div class="content">
    <div class="stats-bar">
      <div class="stat"><div class="icon" style="background:rgba(59,130,246,0.15)">📊</div><div class="info"><div class="num" style="color:#3b82f6">12</div><div class="label">全部项目</div></div></div>
      <div class="stat"><div class="icon" style="background:rgba(16,185,129,0.15)">✓</div><div class="info"><div class="num" style="color:#10b981">5</div><div class="label">已完成</div></div></div>
      <div class="stat"><div class="icon" style="background:rgba(245,158,11,0.15)">⏳</div><div class="info"><div class="num" style="color:#f59e0b">3</div><div class="label">处理中</div></div></div>
      <div class="stat"><div class="icon" style="background:rgba(139,92,246,0.15)">📁</div><div class="info"><div class="num">34</div><div class="label">素材</div></div></div>
    </div>
    <div class="card"><div class="thumb">🏛️</div><div class="body"><h3>秦始皇陵地宫揭秘</h3><p>毫米级三维穿透成像，揭开地宫真容</p><div class="meta"><span class="tag tag-green">已完成</span><span>103秒</span></div></div></div>
    <div class="card"><div class="thumb">⚔️</div><div class="body"><h3>赤壁之战地理考</h3><p>三国历史深度解说，还原真实战场</p><div class="meta"><span class="tag tag-green">已完成</span><span>87秒</span></div></div></div>
    <div class="card"><div class="thumb">🏯</div><div class="body"><h3>唐朝长安城百万人口</h3><p>世界上第一个百万人口都市的故事</p><div class="meta"><span class="tag tag-yellow">处理中</span><span>--</span></div></div></div>
    <div class="card"><div class="thumb">🏠</div><div class="body"><h3>全屋定制报价揭秘</h3><p>欧松板成本37.8元，你花了198</p><div class="meta"><span class="tag tag-green">已完成</span><span>65秒</span></div></div></div>
    <div class="card"><div class="thumb">🔬</div><div class="body"><h3>微波炉谣言真相</h3><p>三十年厨房谣言一次说清</p><div class="meta"><span class="tag tag-blue">草稿</span><span>--</span></div></div></div>
    <div class="card"><div class="thumb">💻</div><div class="body"><h3>RX7900XTX深度评测</h3><p>AMD真的敢卷了，性能平权来了</p><div class="meta"><span class="tag tag-blue">草稿</span><span>--</span></div></div></div>
  </div>
</main>
</body>
</html>
